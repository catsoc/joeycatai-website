<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1080" cy="100" r="320" fill="#2563eb" opacity="0.05"/>
  <circle cx="100"  cy="560" r="220" fill="#2563eb" opacity="0.04"/>

  <!-- Grid pattern (subtle) -->
  <line x1="0"    y1="210" x2="1200" y2="210" stroke="#1e293b" stroke-width="1"/>
  <line x1="0"    y1="420" x2="1200" y2="420" stroke="#1e293b" stroke-width="1"/>
  <line x1="400"  y1="0"   x2="400"  y2="630" stroke="#1e293b" stroke-width="1"/>
  <line x1="800"  y1="0"   x2="800"  y2="630" stroke="#1e293b" stroke-width="1"/>

  <!-- Left blue accent bar -->
  <rect x="80" y="215" width="6" height="180" rx="3" fill="url(#accent)"/>

  <!-- J badge (favicon style) -->
  <rect x="80" y="90" width="72" height="72" rx="18" fill="#2563eb"/>
  <text x="116" y="148"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="48" font-weight="700" text-anchor="middle" fill="white">J</text>

  <!-- Site name -->
  <text x="108" y="315"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="80" font-weight="700" letter-spacing="-2" fill="#f8fafc">joeycatai</text>

  <!-- Description -->
  <text x="108" y="372"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="28" fill="#94a3b8" letter-spacing="0.5">軟體工程師 · 開源愛好者 · 分享技術、專案與思考</text>

  <!-- URL pill -->
  <rect x="108" y="490" width="236" height="46" rx="23" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="226" y="519"
        font-family="'JetBrains Mono', 'Fira Code', monospace, sans-serif"
        font-size="19" text-anchor="middle" fill="#60a5fa">joeycatai.com</text>
</svg>
